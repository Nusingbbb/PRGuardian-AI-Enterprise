
version: "3.9"
services:
  backend:
    image: python:3.11
    working_dir: /app
    volumes: ["./backend:/app"]
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]
  frontend:
    image: node:20
    working_dir: /app
    volumes: ["./frontend:/app"]
    command: sh -c "npm install react react-dom && npx serve -s src -l 3000"
    ports: ["3000:3000"]
